async-stream = "0.3"
bytes = "1.0"
chrono = { version = "0.4", features = ["serde"] }
rand = "0.8"
rusqlite = "0.38.0"
notify = "8.2.0"
notify-debouncer-mini = "0.6.0"
anyhow = "1.0"
