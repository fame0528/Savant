[package]
name = "savant_agent"
version = "0.1.0"
edition = "2021"

[dependencies]
savant_core = { path = "../core" }
savant_skills = { path = "../skills" }
savant_mcp = { path = "../mcp" }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
