<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Savant — Agent Logs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0e14;
            color: #e6e1cf;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 11px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #header {
            background: #141a22;
            padding: 6px 12px;
            border-bottom: 1px solid #2a3140;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        #header h3 {
            color: #00d5ff;
            font-size: 12px;
            font-weight: 600;
        }
        #status {
            font-size: 10px;
            color: #888;
        }
        #copy-btn {
            background: #2a3140;
            color: #00d5ff;
            border: 1px solid #3a4150;
            padding: 3px 10px;
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.15s;
        }
        #copy-btn:hover { background: #3a4150; }
        #copy-btn:active { background: #00d5ff; color: #0a0e14; }
        #log {
            flex: 1;
            overflow-y: auto;
            padding: 4px 8px;
            font-size: 11px;
            line-height: 1.4;
        }
        #log::-webkit-scrollbar { width: 6px; }
        #log::-webkit-scrollbar-track { background: #0a0e14; }
        #log::-webkit-scrollbar-thumb { background: #2a3140; border-radius: 3px; }
        .log-line {
            white-space: pre-wrap;
            word-break: break-all;
            padding: 1px 0;
            border-bottom: 1px solid #141a22;
        }
        .log-line.info { color: #a6e3a1; }
        .log-line.warn { color: #f9e2af; }
        .log-line.error { color: #f38ba8; }
        .log-line.debug { color: #6c7086; }
        .log-line.timestamp { color: #585b70; }
    </style>
</head>
<body>
    <div id="header">
        <h3>Savant Agent Logs</h3>
        <div style="display:flex;gap:8px;align-items:center;">
            <button id="copy-btn" onclick="copyAllLogs()">Copy All</button>
            <span id="status">Connecting...</span>
        </div>
    </div>
    <div id="log"></div>

    <script>
        const logEl = document.getElementById('log');
        const statusEl = document.getElementById('status');
        const MAX_LINES = 1000;

        function addLine(text) {
            const div = document.createElement('div');
            div.className = 'log-line';
            let cls = '';
            if (text.includes('[ERROR]')) cls = 'error';
            else if (text.includes('[WARN]')) cls = 'warn';
            else if (text.includes('[INFO]')) cls = 'info';
            else if (text.includes('[DEBUG]')) cls = 'debug';
            div.className = 'log-line ' + cls;
            div.textContent = text;
            logEl.appendChild(div);
            while (logEl.children.length > MAX_LINES) logEl.removeChild(logEl.firstChild);
            logEl.scrollTop = logEl.scrollHeight;
        }

        statusEl.textContent = 'Listening (Tauri)';
        statusEl.style.color = '#a6e3a1';

        // Use Tauri event system to receive system logs
        window.__TAURI__.event.listen('system-log-event', (event) => {
            const logMsg = event.payload;
            addLine(logMsg);
        }).catch((e) => {
            statusEl.textContent = 'Tauri event error: ' + e;
            statusEl.style.color = '#f38ba8';
        });

        function copyAllLogs() {
            const lines = Array.from(logEl.children).map(el => el.textContent).join('\n');
            navigator.clipboard.writeText(lines).then(() => {
                const btn = document.getElementById('copy-btn');
                const orig = btn.textContent;
                btn.textContent = 'COPIED';
                btn.style.background = '#00d5ff';
                btn.style.color = '#0a0e14';
                setTimeout(() => {
                    btn.textContent = orig;
                    btn.style.background = '';
                    btn.style.color = '';
                }, 2000);
            });
        }
    </script>
</body>
</html>
